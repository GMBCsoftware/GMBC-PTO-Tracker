<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f3ea;
      color: #333F48;
      margin: 0;
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #e8ddc8;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 80px;
    }

    button {
      background: #333F48;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      margin-top: 8px;
      margin-right: 6px;
    }

    button.secondary {
      background: #85431E;
    }

    button.danger {
      background: #9b1c1c;
    }

    button.light {
      background: #e8ddc8;
      color: #333F48;
    }

    button.tab {
      background: #e8ddc8;
      color: #333F48;
      margin-bottom: 10px;
    }

    button.tab.active {
      background: #333F48;
      color: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: top;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .warning {
      color: #9b1c1c;
      font-weight: bold;
    }

    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      background: #eee;
      font-size: 12px;
    }

    .hidden {
      display: none;
    }

    .subtle {
      color: #8b8b8b;
      font-size: 12px;
    }

    .edit-card {
      border: 2px solid #333F48;
    }

    .actions {
      min-width: 210px;
    }

    .account-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .account-tools p {
      margin: 0;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .filter-bar select {
      width: auto;
      min-width: 220px;
      margin-top: 0;
    }

    .request-list {
      display: grid;
      gap: 12px;
    }

    .request-item {
      border: 1px solid #e8ddc8;
      border-radius: 12px;
      overflow: hidden;
      background: #fffdfa;
    }

    .request-toggle {
      width: 100%;
      margin: 0;
      border-radius: 0;
      background: #fffdfa;
      color: #333F48;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      text-align: left;
    }

    .request-toggle:hover {
      background: #f7f3ea;
    }

    .request-summary {
      font-weight: bold;
    }

    .request-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .request-detail {
      padding: 16px;
      border-top: 1px solid #e8ddc8;
    }

    .request-detail p {
      margin: 0 0 10px;
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>Paid Time Off</h1>
  <div id="app" class="card">Loading...</div>
</div>

<script>
var APP_BOOT_ELEMENT = document.getElementById('app');
if (APP_BOOT_ELEMENT) {
  APP_BOOT_ELEMENT.innerHTML = '<p>Booting PTO app...</p>';
}

var DATA = null;
var ADMIN_FILTER = 'pending';
var SUPERVISOR_FILTER = 'pending';
var ADMIN_EMPLOYEE_FILTER = 'all';
var SUPERVISOR_EMPLOYEE_FILTER = 'all';
var BOOTSTRAP_TIMEOUT = null;
var BOOTSTRAP_TIMEOUT_MS = 15000;

function startBootstrapTimeout() {
  clearBootstrapTimeout();
  BOOTSTRAP_TIMEOUT = window.setTimeout(function() {
    showError('The PTO app did not receive a response from Google Apps Script. If you just changed the project, confirm the latest code was saved and redeployed, then reload this page.');
  }, BOOTSTRAP_TIMEOUT_MS);
}

function clearBootstrapTimeout() {
  if (BOOTSTRAP_TIMEOUT) {
    window.clearTimeout(BOOTSTRAP_TIMEOUT);
    BOOTSTRAP_TIMEOUT = null;
  }
}

function load() {
  var app = document.getElementById('app');
  app.innerHTML = '<p>Loading PTO data...</p>';

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    showError('Google Apps Script client services are unavailable on this page. Open the deployed web app URL directly from Apps Script and try again.');
    return;
  }

  startBootstrapTimeout();

  google.script.run
    .withSuccessHandler(function(data) {
      clearBootstrapTimeout();
      try {
        render(data);
      } catch (err) {
        showError(err);
      }
    })
    .withFailureHandler(function(err) {
      clearBootstrapTimeout();
      showError(err);
    })
    .getBootstrapData();
}

function showError(err) {
  var msg = err && err.message ? err.message : String(err);
  clearBootstrapTimeout();
  document.getElementById('app').innerHTML =
    '<h2>Something went wrong</h2>' +
    '<p class="warning">' + escapeHtml(msg) + '</p>' +
    '<div class="account-tools">' +
      '<p class="muted">If the wrong Google account opened the app, try the Google account chooser and then reload.</p>' +
      '<div>' +
        '<button class="light" onclick="switchGoogleAccount()">Choose Google Account</button>' +
        '<button onclick="reloadApp()">Reload</button>' +
      '</div>' +
    '</div>' +
    '<p class="muted">Check that the Employees, Requests, Settings, and Audit tabs exist and that their headers match exactly.</p>';
}

function render(data) {
  var app = document.getElementById('app');
  var emailLine = '';
  DATA = data;

  if (!data.ok) {
    if (data.user && data.user.email) {
      emailLine = '<p class="muted">Google account detected: ' + escapeHtml(data.user.email) + '</p>';
    } else {
      emailLine = '<p class="muted">No Google Workspace email was detected for this session.</p>';
    }

    app.innerHTML =
      '<h2>Sign-in issue</h2>' +
      '<p class="warning">' + escapeHtml(data.message) + '</p>' +
      emailLine +
      '<div class="account-tools">' +
        '<p class="muted">If this is the wrong account, open the Google account chooser and then reload the PTO app.</p>' +
        '<div>' +
          '<button class="light" onclick="switchGoogleAccount()">Choose Google Account</button>' +
          '<button onclick="reloadApp()">Reload</button>' +
        '</div>' +
      '</div>';
    return;
  }

  app.innerHTML =
    '<div class="card">' +
      '<h2>Hello, ' + escapeHtml(data.employee.Name) + '</h2>' +
      '<div class="account-tools">' +
        '<p class="muted">Signed in as ' + escapeHtml(data.employee.Email) + '</p>' +
        '<button class="light" onclick="switchGoogleAccount()">Choose Google Account</button>' +
      '</div>' +
    '</div>' +
    renderBalances(data.balances) +
    renderRequestForm() +
    renderRequests('My Requests', data.myRequests, false, false) +
    (data.isSupervisor ? renderSupervisorDashboard(data.supervisorRequests) : '') +
    (data.isAdmin ? renderAdminDashboard(data.allRequests, data.employees) : '');

  initializeHoursRecommendationWidgets();
}

function renderBalances(b) {
  return (
    '<div class="card">' +
      '<h2>My Time Off Balance</h2>' +
      '<div class="grid">' +
        '<div class="card">' +
          '<h3>Annual Leave</h3>' +
          '<p><strong>Allowance:</strong> ' + escapeHtml(b.annual.allowanceHours) + ' hrs</p>' +
          '<p><strong>Used:</strong> ' + escapeHtml(b.annual.usedHours) + ' hrs</p>' +
          '<p><strong>Requested:</strong> ' + escapeHtml(b.annual.requestedHours) + ' hrs</p>' +
          '<p><strong>Available Now:</strong> ' + escapeHtml(b.annual.availableHours) + ' hrs ' + renderProjectedBalance(b.annual.remainingAfterRequestedHours) + '</p>' +
        '</div>' +
        '<div class="card">' +
          '<h3>Personal Leave</h3>' +
          '<p><strong>Allowance:</strong> ' + escapeHtml(b.personal.allowanceHours) + ' hrs</p>' +
          '<p><strong>Used:</strong> ' + escapeHtml(b.personal.usedHours) + ' hrs</p>' +
          '<p><strong>Requested:</strong> ' + escapeHtml(b.personal.requestedHours) + ' hrs</p>' +
          '<p><strong>Available Now:</strong> ' + escapeHtml(b.personal.availableHours) + ' hrs ' + renderProjectedBalance(b.personal.remainingAfterRequestedHours) + '</p>' +
        '</div>' +
        '<div class="card">' +
          '<h3>Serious Illness</h3>' +
          '<p><strong>Allowance:</strong> ' + escapeHtml(b.serious.allowanceHours) + ' hrs</p>' +
          '<p><strong>Used:</strong> ' + escapeHtml(b.serious.usedHours) + ' hrs</p>' +
          '<p><strong>Requested:</strong> ' + escapeHtml(b.serious.requestedHours) + ' hrs</p>' +
          '<p><strong>Available Now:</strong> ' + escapeHtml(b.serious.availableHours) + ' hrs ' + renderProjectedBalance(b.serious.remainingAfterRequestedHours) + '</p>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function renderProjectedBalance(value) {
  return '<span class="subtle">(after requested: ' + escapeHtml(value) + ' hrs)</span>';
}

function renderRequestForm() {
  return (
    '<div class="card">' +
      '<h2>Request Time Off</h2>' +
      '<label>Leave Type</label>' +
      '<select id="leaveType">' +
        '<option>Annual Leave</option>' +
        '<option>Personal Leave</option>' +
        '<option>Serious Illness Leave</option>' +
        '<option>Bereavement Leave</option>' +
        '<option>Unpaid Leave</option>' +
        '<option>Other</option>' +
      '</select>' +
      '<div class="grid">' +
        '<div>' +
          '<label>Start Date</label>' +
          '<input id="startDate" type="date" onchange="refreshHoursRecommendation()">' +
        '</div>' +
        '<div>' +
          '<label>End Date</label>' +
          '<input id="endDate" type="date" onchange="refreshHoursRecommendation()">' +
        '</div>' +
        '<div>' +
          '<label>Hours Requested</label>' +
          '<input id="hoursRequested" type="number" step="0.25" min="0">' +
        '</div>' +
      '</div>' +
      '<p id="hoursRecommendation" class="muted"></p>' +
      '<button type="button" class="light" onclick="applyHoursRecommendation()">Use Recommended Hours</button>' +
      '<label>Reason / Notes</label>' +
      '<textarea id="reason"></textarea>' +
      '<button onclick="submitRequest()">Submit Request</button>' +
      '<p id="submitResult" class="muted"></p>' +
    '</div>'
  );
}

function renderAdminDashboard(requests, employees) {
  var pendingClass = ADMIN_FILTER === 'pending' ? ' active' : '';
  var approvedClass = ADMIN_FILTER === 'approved' ? ' active' : '';
  var deniedClass = ADMIN_FILTER === 'denied' ? ' active' : '';
  var allClass = ADMIN_FILTER === 'all' ? ' active' : '';
  var filteredRequests = filterRequestsForDashboard(requests || [], ADMIN_FILTER, ADMIN_EMPLOYEE_FILTER);

  return (
    '<div class="card">' +
      '<h2>Admin Dashboard</h2>' +
      renderAdminRequestForm(employees || []) +
      renderEmployeeFilterControl('adminEmployeeFilter', ADMIN_EMPLOYEE_FILTER, requests || [], 'setAdminEmployeeFilter') +
      '<button class="tab' + pendingClass + '" onclick="setAdminFilter(\'pending\')">Pending / Unapproved</button>' +
      '<button class="tab' + approvedClass + '" onclick="setAdminFilter(\'approved\')">Approved</button>' +
      '<button class="tab' + deniedClass + '" onclick="setAdminFilter(\'denied\')">Denied</button>' +
      '<button class="tab' + allClass + '" onclick="setAdminFilter(\'all\')">All</button>' +
      renderRequestsTable(filteredRequests, true, false) +
    '</div>'
  );
}

function renderAdminRequestForm(employees) {
  var i;
  var employeeOptions = '<option value="">Select staff member</option>';

  for (i = 0; i < employees.length; i++) {
    employeeOptions +=
      '<option value="' + escapeAttr(employees[i].Email || '') + '">' +
      escapeHtml(employees[i].Name || employees[i].Email || '') +
      '</option>';
  }

  return (
    '<div class="card">' +
      '<h3>Add Request For Staff Member</h3>' +
      '<p class="muted">Use this form when an admin needs to enter PTO on behalf of a staff member. The request will be sent to that employee\'s supervisor for approval.</p>' +
      '<label>Staff Member</label>' +
      '<select id="adminEmployeeEmail">' +
        employeeOptions +
      '</select>' +
      '<label>Leave Type</label>' +
      '<select id="adminLeaveType">' +
        '<option>Annual Leave</option>' +
        '<option>Personal Leave</option>' +
        '<option>Serious Illness Leave</option>' +
        '<option>Bereavement Leave</option>' +
        '<option>Unpaid Leave</option>' +
        '<option>Other</option>' +
      '</select>' +
      '<div class="grid">' +
        '<div>' +
          '<label>Start Date</label>' +
          '<input id="adminStartDate" type="date" onchange="refreshAdminHoursRecommendation()">' +
        '</div>' +
        '<div>' +
          '<label>End Date</label>' +
          '<input id="adminEndDate" type="date" onchange="refreshAdminHoursRecommendation()">' +
        '</div>' +
        '<div>' +
          '<label>Hours Requested</label>' +
          '<input id="adminHoursRequested" type="number" step="0.25" min="0">' +
        '</div>' +
      '</div>' +
      '<p id="adminHoursRecommendation" class="muted"></p>' +
      '<button type="button" class="light" onclick="applyAdminHoursRecommendation()">Use Recommended Hours</button>' +
      '<label>Reason / Notes</label>' +
      '<textarea id="adminReason"></textarea>' +
      '<button onclick="submitAdminRequest()">Add Request For Staff</button>' +
      '<p id="adminSubmitResult" class="muted"></p>' +
    '</div>'
  );
}

function renderSupervisorDashboard(requests) {
  var pendingClass = SUPERVISOR_FILTER === 'pending' ? ' active' : '';
  var approvedClass = SUPERVISOR_FILTER === 'approved' ? ' active' : '';
  var deniedClass = SUPERVISOR_FILTER === 'denied' ? ' active' : '';
  var allClass = SUPERVISOR_FILTER === 'all' ? ' active' : '';
  var filteredRequests = filterRequestsForDashboard(requests || [], SUPERVISOR_FILTER, SUPERVISOR_EMPLOYEE_FILTER);

  return (
    '<div class="card">' +
      '<h2>Supervisor Dashboard</h2>' +
      renderEmployeeFilterControl('supervisorEmployeeFilter', SUPERVISOR_EMPLOYEE_FILTER, requests || [], 'setSupervisorEmployeeFilter') +
      '<button class="tab' + pendingClass + '" onclick="setSupervisorFilter(\'pending\')">Pending / Unapproved</button>' +
      '<button class="tab' + approvedClass + '" onclick="setSupervisorFilter(\'approved\')">Approved</button>' +
      '<button class="tab' + deniedClass + '" onclick="setSupervisorFilter(\'denied\')">Denied</button>' +
      '<button class="tab' + allClass + '" onclick="setSupervisorFilter(\'all\')">All</button>' +
      renderRequestsTable(filteredRequests, false, true) +
    '</div>'
  );
}

function setAdminFilter(filter) {
  ADMIN_FILTER = filter;
  render(DATA);
}

function setSupervisorFilter(filter) {
  SUPERVISOR_FILTER = filter;
  render(DATA);
}

function setAdminEmployeeFilter(value) {
  ADMIN_EMPLOYEE_FILTER = value || 'all';
  render(DATA);
}

function setSupervisorEmployeeFilter(value) {
  SUPERVISOR_EMPLOYEE_FILTER = value || 'all';
  render(DATA);
}

function filterRequestsForDashboard(requests, bucket, employeeFilter) {
  var i;
  var filtered = [];
  var status;

  for (i = 0; i < requests.length; i++) {
    if (
      employeeFilter &&
      employeeFilter !== 'all' &&
      String(requests[i].EmployeeEmail || '').toLowerCase() !== String(employeeFilter).toLowerCase()
    ) {
      continue;
    }

    status = requests[i].Status;

    if (bucket === 'approved' && isApprovedStatus(status)) {
      filtered.push(requests[i]);
    } else if (bucket === 'denied' && isDeniedStatus(status)) {
      filtered.push(requests[i]);
    } else if (bucket === 'all') {
      filtered.push(requests[i]);
    } else if (bucket === 'pending' && isPendingStatus(status)) {
      filtered.push(requests[i]);
    }
  }

  return filtered;
}

function isApprovedStatus(status) {
  return status === 'Approved' || status === 'Edit Approved';
}

function isDeniedStatus(status) {
  return (
    status === 'Denied by Supervisor' ||
    status === 'Denied by Admin' ||
    status === 'Edit Denied by Supervisor' ||
    status === 'Edit Denied by Admin'
  );
}

function isPendingStatus(status) {
  return (
    status === 'Pending Supervisor Approval' ||
    status === 'Pending Admin Final Approval' ||
    status === 'Pending Supervisor Reapproval' ||
    status === 'Pending Admin Reapproval'
  );
}

function renderEmployeeFilterControl(selectId, selectedValue, requests, onChangeHandler) {
  var employees = getEmployeeFilterOptions(requests || []);
  var i;
  var options = '<option value="all">All employees</option>';

  for (i = 0; i < employees.length; i++) {
    options +=
      '<option value="' + escapeAttr(employees[i].email) + '"' +
      (selectedValue === employees[i].email ? ' selected' : '') +
      '>' + escapeHtml(employees[i].name) + '</option>';
  }

  return (
    '<div class="filter-bar">' +
      '<label for="' + escapeAttr(selectId) + '">Employee</label>' +
      '<select id="' + escapeAttr(selectId) + '" onchange="' + onChangeHandler + '(this.value)">' +
        options +
      '</select>' +
    '</div>'
  );
}

function getEmployeeFilterOptions(requests) {
  var map = {};
  var emails = [];
  var i;

  for (i = 0; i < requests.length; i++) {
    if (!requests[i].EmployeeEmail) {
      continue;
    }

    if (!map[requests[i].EmployeeEmail]) {
      map[requests[i].EmployeeEmail] = requests[i].EmployeeName || requests[i].EmployeeEmail;
      emails.push(requests[i].EmployeeEmail);
    }
  }

  emails.sort(function(a, b) {
    var aName = map[a].toLowerCase();
    var bName = map[b].toLowerCase();

    if (aName < bName) {
      return -1;
    }

    if (aName > bName) {
      return 1;
    }

    return 0;
  });

  return emails.map(function(email) {
    return {
      email: email,
      name: map[email]
    };
  });
}

function renderRequests(title, requests, adminMode, supervisorMode) {
  var content = adminMode || supervisorMode
    ? renderRequestsTable(requests, adminMode, supervisorMode)
    : renderEmployeeRequests(requests);

  return (
    '<div class="card">' +
      '<h2>' + escapeHtml(title) + '</h2>' +
      content +
    '</div>'
  );
}

function renderEmployeeRequests(requests) {
  var i;
  var html = '';
  var statusHint;
  var reasonText;
  var warningsHtml;

  if (!requests || !requests.length) {
    return '<p class="muted">No requests found in your current anniversary cycle.</p>';
  }

  for (i = 0; i < requests.length; i++) {
    statusHint = getStatusHintText(requests[i]);
    reasonText = requests[i].Reason ? escapeHtml(requests[i].Reason) : 'No reason provided';
    warningsHtml = requests[i].Warnings
      ? '<p><strong>Warnings:</strong> <span class="warning">' + escapeHtml(requests[i].Warnings) + '</span></p>'
      : '';

    html +=
      '<div class="request-item">' +
        '<button type="button" class="request-toggle" onclick="toggleRequestDetails(\'' + escapeAttr(requests[i].RequestId) + '\')">' +
          '<span class="request-summary">' +
            escapeHtml(formatDisplayDate(requests[i].StartDate)) + ' - ' +
            escapeHtml(formatDisplayDate(requests[i].EndDate)) + ' - ' +
            escapeHtml(requests[i].HoursRequested || '') + ' hours - ' +
            escapeHtml(requests[i].Status || '') +
          '</span>' +
          '<span class="request-meta">' +
            '<span class="pill">' + escapeHtml(statusHint) + '</span>' +
            '<span class="muted">View details</span>' +
          '</span>' +
        '</button>' +
        '<div id="request-detail-' + escapeAttr(requests[i].RequestId) + '" class="request-detail hidden">' +
          '<p><strong>Leave type:</strong> ' + escapeHtml(requests[i].LeaveType || '') + '</p>' +
          '<p><strong>Dates:</strong> ' + escapeHtml(formatDisplayDate(requests[i].StartDate)) + ' to ' + escapeHtml(formatDisplayDate(requests[i].EndDate)) + '</p>' +
          '<p><strong>Hours requested:</strong> ' + escapeHtml(requests[i].HoursRequested || '') + '</p>' +
          '<p><strong>Reason / Notes:</strong> ' + reasonText + '</p>' +
          warningsHtml +
          '<div class="actions">' + renderEmployeeButtons(requests[i]) + '</div>' +
          '<div id="edit-row-' + escapeAttr(requests[i].RequestId) + '" class="hidden">' +
            renderEditCard(requests[i]) +
          '</div>' +
        '</div>' +
      '</div>';
  }

  return '<div class="request-list">' + html + '</div>';
}

function renderRequestsTable(requests, adminMode, supervisorMode) {
  var i;
  var html = '';
  var warningsHtml;

  if (!requests || !requests.length) {
    return '<p class="muted">No requests found.</p>';
  }

  for (i = 0; i < requests.length; i++) {
    warningsHtml = requests[i].Warnings
      ? '<span class="warning">' + escapeHtml(requests[i].Warnings) + '</span>'
      : '';

    html +=
      '<tr>' +
        '<td><strong>' + escapeHtml(requests[i].EmployeeName || '') + '</strong><br><span class="muted">' + escapeHtml(requests[i].EmployeeEmail || '') + '</span></td>' +
        '<td>' + escapeHtml(requests[i].LeaveType || '') + '</td>' +
        '<td>' + escapeHtml(formatDisplayDate(requests[i].StartDate)) + ' to ' + escapeHtml(formatDisplayDate(requests[i].EndDate)) + '</td>' +
        '<td>' + escapeHtml(requests[i].HoursRequested || '') + '</td>' +
        '<td><span class="pill">' + escapeHtml(requests[i].Status || '') + '</span></td>' +
        '<td>' + warningsHtml + '</td>' +
        '<td class="actions">' + renderActions(requests[i], adminMode, supervisorMode) + '</td>' +
      '</tr>' +
      '<tr id="edit-row-' + escapeAttr(requests[i].RequestId) + '" class="hidden">' +
        '<td colspan="7">' + renderEditCard(requests[i]) + '</td>' +
      '</tr>';
  }

  return (
    '<table>' +
      '<thead>' +
        '<tr>' +
          '<th>Employee</th>' +
          '<th>Type</th>' +
          '<th>Dates</th>' +
          '<th>Hours</th>' +
          '<th>Status</th>' +
          '<th>Warnings</th>' +
          '<th>Action</th>' +
        '</tr>' +
      '</thead>' +
      '<tbody>' + html + '</tbody>' +
    '</table>'
  );
}

function renderActions(request, adminMode, supervisorMode) {
  if (adminMode) {
    return renderAdminButtons(request);
  }

  if (supervisorMode) {
    return renderSupervisorButtons(request);
  }

  return renderEmployeeButtons(request);
}

function renderEmployeeButtons(request) {
  var actions = '';

  if (canEmployeeEditRequest(request)) {
    actions += '<button class="secondary" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Edit</button>';
  }

  actions += '<div class="muted">' + escapeHtml(getStatusHintText(request)) + '</div>';
  return actions;
}

function renderStatusHint(request) {
  return '<span class="muted">' + escapeHtml(getStatusHintText(request)) + '</span>';
}

function getStatusHintText(request) {
  if (request.Status === 'Pending Supervisor Approval') {
    return 'Waiting on supervisor';
  }

  if (request.Status === 'Pending Admin Final Approval') {
    return 'Waiting on final admin approval';
  }

  if (request.Status === 'Pending Supervisor Reapproval') {
    return 'Change waiting on supervisor final approval';
  }

  if (request.Status === 'Pending Admin Reapproval') {
    return 'Change waiting on final admin approval';
  }

  if (request.Status === 'Approved') {
    return 'Approved';
  }

  if (request.Status === 'Edit Approved') {
    return 'Approved change';
  }

  if (request.Status === 'Edit Denied by Supervisor' || request.Status === 'Edit Denied by Admin') {
    return 'Change denied';
  }

  return request.Status || '';
}

function canEmployeeEditRequest(request) {
  return (
    request.Status === 'Pending Supervisor Approval' ||
    request.Status === 'Pending Admin Final Approval' ||
    request.Status === 'Approved' ||
    request.Status === 'Pending Supervisor Reapproval' ||
    request.Status === 'Pending Admin Reapproval'
  );
}

function renderSupervisorButtons(request) {
  if (
    request.Status !== 'Pending Supervisor Approval' &&
    request.Status !== 'Pending Supervisor Reapproval'
  ) {
    return '';
  }

  return (
    '<button class="secondary" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Edit</button>' +
    '<label style="font-weight:normal; display:block; margin-top:8px;">' +
      '<input type="checkbox" id="sup-override-' + escapeAttr(request.RequestId) + '" style="width:auto;">' +
      ' Override balance if needed' +
    '</label>' +
    '<button onclick="supervisorDecision(\'' + escapeAttr(request.RequestId) + '\',\'approve\')">Approve</button>' +
    '<button class="danger" onclick="supervisorDecision(\'' + escapeAttr(request.RequestId) + '\',\'deny\')">Deny</button>'
  );
}

function renderAdminButtons(request) {
  if (
    request.Status !== 'Pending Admin Final Approval' &&
    request.Status !== 'Pending Supervisor Approval' &&
    request.Status !== 'Pending Admin Reapproval' &&
    request.Status !== 'Pending Supervisor Reapproval'
  ) {
    return '';
  }

  return (
    '<button class="secondary" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Edit</button>' +
    '<label style="font-weight:normal; display:block; margin-top:8px;">' +
      '<input type="checkbox" id="override-' + escapeAttr(request.RequestId) + '" style="width:auto;">' +
      ' Override balance if needed' +
    '</label>' +
    '<button onclick="adminDecision(\'' + escapeAttr(request.RequestId) + '\',\'approve\')">Final Approve</button>' +
    '<button class="danger" onclick="adminDecision(\'' + escapeAttr(request.RequestId) + '\',\'deny\')">Deny</button>'
  );
}

function renderEditCard(request) {
  var isApproved = request.Status === 'Approved';
  var saveLabel = isApproved ? 'Submit Change For Reapproval' : 'Save Changes';
  var helperText = isApproved
    ? 'Changes to an approved request will create a reapproval request. The current calendar schedule will stay in place until the updated request is approved.'
    : 'Changes made here update the request without sending a new email while it is still waiting for approval.';

  return (
    '<div class="card edit-card">' +
      '<h3>Edit Request</h3>' +
      '<p class="muted">' + escapeHtml(helperText) + '</p>' +
      '<div class="grid">' +
        '<div>' +
          '<label>Start Date</label>' +
          '<input id="edit-start-' + escapeAttr(request.RequestId) + '" type="date" value="' + escapeAttr(formatDateInputValue(request.StartDate)) + '" onchange="refreshEditHoursRecommendation(\'' + escapeAttr(request.RequestId) + '\')">' +
        '</div>' +
        '<div>' +
          '<label>End Date</label>' +
          '<input id="edit-end-' + escapeAttr(request.RequestId) + '" type="date" value="' + escapeAttr(formatDateInputValue(request.EndDate)) + '" onchange="refreshEditHoursRecommendation(\'' + escapeAttr(request.RequestId) + '\')">' +
        '</div>' +
        '<div>' +
          '<label>Hours Requested</label>' +
          '<input id="edit-hours-' + escapeAttr(request.RequestId) + '" type="number" step="0.25" min="0" value="' + escapeAttr(request.HoursRequested || '') + '">' +
        '</div>' +
      '</div>' +
      '<p id="edit-recommend-' + escapeAttr(request.RequestId) + '" class="muted"></p>' +
      '<button type="button" class="light" onclick="applyEditHoursRecommendation(\'' + escapeAttr(request.RequestId) + '\')">Use Recommended Hours</button>' +
      '<label>Reason / Notes</label>' +
      '<textarea id="edit-reason-' + escapeAttr(request.RequestId) + '">' + escapeHtml(request.Reason || '') + '</textarea>' +
      '<button onclick="saveRequestEdit(\'' + escapeAttr(request.RequestId) + '\')">' + saveLabel + '</button>' +
      '<button class="light" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Cancel</button>' +
      '<p id="edit-result-' + escapeAttr(request.RequestId) + '" class="muted"></p>' +
    '</div>'
  );
}

function toggleEditCard(requestId) {
  var row = document.getElementById('edit-row-' + requestId);
  if (row) {
    if (row.className.indexOf('hidden') >= 0) {
      row.className = row.className.replace('hidden', '').trim();
      refreshEditHoursRecommendation(requestId);
    } else {
      row.className += ' hidden';
    }
  }
}

function toggleRequestDetails(requestId) {
  var detail = document.getElementById('request-detail-' + requestId);

  if (!detail) {
    return;
  }

  if (detail.className.indexOf('hidden') >= 0) {
    detail.className = detail.className.replace('hidden', '').trim();
    refreshEditHoursRecommendation(requestId);
    return;
  }

  detail.className += ' hidden';
}

function saveRequestEdit(requestId) {
  var startDate = document.getElementById('edit-start-' + requestId).value;
  var endDate = document.getElementById('edit-end-' + requestId).value;
  var hoursRequested = document.getElementById('edit-hours-' + requestId).value;
  var reason = document.getElementById('edit-reason-' + requestId).value;
  var result = document.getElementById('edit-result-' + requestId);

  result.innerText = 'Saving...';

  google.script.run
    .withSuccessHandler(function(res) {
      result.innerText = res.message;
      load();
    })
    .withFailureHandler(function(err) {
      result.innerText = err.message || String(err);
    })
    .updateRequestDetails(requestId, {
      startDate: startDate,
      endDate: endDate,
      hoursRequested: hoursRequested,
      reason: reason
    });
}

function initializeHoursRecommendationWidgets() {
  var editRows;
  var i;

  refreshHoursRecommendation();
  editRows = document.querySelectorAll('[id^="edit-row-"]');

  for (i = 0; i < editRows.length; i++) {
    refreshEditHoursRecommendation(editRows[i].id.replace('edit-row-', ''));
  }
}

function refreshHoursRecommendation() {
  refreshRecommendationForFields('startDate', 'endDate', 'hoursRequested', 'hoursRecommendation');
}

function refreshAdminHoursRecommendation() {
  refreshRecommendationForFields('adminStartDate', 'adminEndDate', 'adminHoursRequested', 'adminHoursRecommendation');
}

function refreshEditHoursRecommendation(requestId) {
  refreshRecommendationForFields(
    'edit-start-' + requestId,
    'edit-end-' + requestId,
    'edit-hours-' + requestId,
    'edit-recommend-' + requestId
  );
}

function applyHoursRecommendation() {
  applyRecommendationForField('startDate', 'endDate', 'hoursRequested');
  refreshHoursRecommendation();
}

function applyAdminHoursRecommendation() {
  applyRecommendationForField('adminStartDate', 'adminEndDate', 'adminHoursRequested');
  refreshAdminHoursRecommendation();
}

function applyEditHoursRecommendation(requestId) {
  applyRecommendationForField(
    'edit-start-' + requestId,
    'edit-end-' + requestId,
    'edit-hours-' + requestId
  );
  refreshEditHoursRecommendation(requestId);
}

function refreshRecommendationForFields(startId, endId, hoursId, messageId) {
  var startValue = document.getElementById(startId);
  var endValue = document.getElementById(endId);
  var hoursField = document.getElementById(hoursId);
  var message = document.getElementById(messageId);
  var suggestion;

  if (!startValue || !endValue || !hoursField || !message) {
    return;
  }

  suggestion = getHourSuggestion(startValue.value, endValue.value);

  if (!suggestion) {
    message.innerText = '';
    return;
  }

  message.innerText =
    'Recommended hours: ' + suggestion.hours +
    ' (' + suggestion.days +
    ' workday' + (suggestion.days === 1 ? '' : 's') +
    ' at 8 hours based on the ' + suggestion.pattern + ' schedule).';

  if (shouldAutoApplySuggestion(hoursField, suggestion.hours)) {
    hoursField.value = suggestion.hours;
  }

  hoursField.setAttribute('data-last-suggested', String(suggestion.hours));
}

function applyRecommendationForField(startId, endId, hoursId) {
  var hoursField = document.getElementById(hoursId);
  var startValue = document.getElementById(startId);
  var endValue = document.getElementById(endId);
  var suggestion;

  if (!hoursField || !startValue || !endValue) {
    return;
  }

  suggestion = getHourSuggestion(startValue.value, endValue.value);

  if (!suggestion) {
    return;
  }

  hoursField.value = suggestion.hours;
  hoursField.setAttribute('data-last-suggested', String(suggestion.hours));
}

function shouldAutoApplySuggestion(hoursField, suggestedHours) {
  var currentValue = String(hoursField.value || '').trim();
  var previousSuggested = String(hoursField.getAttribute('data-last-suggested') || '').trim();

  return !currentValue || currentValue === '0' || currentValue === previousSuggested;
}

function getHourSuggestion(startDate, endDate) {
  var start = parseDateInput(startDate);
  var end = parseDateInput(endDate);
  var cursor;
  var days = 0;
  var workingDayIndexes = getWorkingDayIndexes();

  if (!start || !end || end < start) {
    return null;
  }

  cursor = new Date(start.getFullYear(), start.getMonth(), start.getDate());

  while (cursor <= end) {
    if (workingDayIndexes.indexOf(cursor.getDay()) >= 0) {
      days += 1;
    }

    cursor.setDate(cursor.getDate() + 1);
  }

  return {
    days: days,
    hours: days * 8,
    pattern: getSchedulePatternLabel()
  };
}

function getWorkingDayIndexes() {
  var schedule = DATA && DATA.recommendedSchedule;
  var rawIndexes = schedule && schedule.workingDayIndexes;
  var indexes = [];
  var i;

  if (!rawIndexes || !rawIndexes.length) {
    return [0, 1, 2, 3, 4];
  }

  for (i = 0; i < rawIndexes.length; i++) {
    indexes.push(Number(rawIndexes[i]));
  }

  return indexes;
}

function getSchedulePatternLabel() {
  var schedule = DATA && DATA.recommendedSchedule;

  if (!schedule || !schedule.pattern) {
    return 'SUN-THUR';
  }

  if (schedule.label) {
    return schedule.label + ' (' + schedule.pattern + ')';
  }

  return schedule.pattern;
}

function parseDateInput(value) {
  var parts;

  if (!value) {
    return null;
  }

  parts = String(value).split('-');

  if (parts.length !== 3) {
    return null;
  }

  return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
}

function submitRequest() {
  var payload = {
    leaveType: document.getElementById('leaveType').value,
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value,
    hoursRequested: document.getElementById('hoursRequested').value,
    reason: document.getElementById('reason').value
  };

  document.getElementById('submitResult').innerText = 'Submitting...';

  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('submitResult').innerText = res.message;
      load();
    })
    .withFailureHandler(function(err) {
      document.getElementById('submitResult').innerText = err.message || String(err);
    })
    .submitRequest(payload);
}

function submitAdminRequest() {
  var payload = {
    employeeEmail: document.getElementById('adminEmployeeEmail').value,
    leaveType: document.getElementById('adminLeaveType').value,
    startDate: document.getElementById('adminStartDate').value,
    endDate: document.getElementById('adminEndDate').value,
    hoursRequested: document.getElementById('adminHoursRequested').value,
    reason: document.getElementById('adminReason').value
  };

  document.getElementById('adminSubmitResult').innerText = 'Submitting...';

  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('adminSubmitResult').innerText = res.message;
      load();
    })
    .withFailureHandler(function(err) {
      document.getElementById('adminSubmitResult').innerText = err.message || String(err);
    })
    .submitAdminRequest(payload);
}

function supervisorDecision(requestId, decision) {
  var overrideBox = document.getElementById('sup-override-' + requestId);
  var overrideBalance = overrideBox ? overrideBox.checked : false;
  var note = prompt('Optional note for this decision:', '') || '';

  google.script.run
    .withSuccessHandler(function(res) {
      alert(res.message);
      load();
    })
    .withFailureHandler(showError)
    .supervisorDecision(requestId, decision, note, overrideBalance);
}

function adminDecision(requestId, decision) {
  var overrideBox = document.getElementById('override-' + requestId);
  var overrideBalance = overrideBox ? overrideBox.checked : false;
  var note = prompt('Optional note for this decision:', '') || '';

  google.script.run
    .withSuccessHandler(function(res) {
      alert(res.message);
      load();
    })
    .withFailureHandler(showError)
    .adminDecision(requestId, decision, note, overrideBalance);
}

function formatDateInputValue(value) {
  if (!value) {
    return '';
  }

  if (typeof value === 'string') {
    return value.substring(0, 10);
  }

  return String(value).substring(0, 10);
}

function formatDisplayDate(value) {
  var date;

  if (!value) {
    return '';
  }

  if (typeof value === 'string') {
    if (/^\d{4}-\d{2}-\d{2}/.test(value)) {
      return Number(value.substring(5, 7)) + '/' + Number(value.substring(8, 10)) + '/' + value.substring(0, 4);
    }

    date = new Date(value);
  } else {
    date = new Date(value);
  }

  if (isNaN(date.getTime())) {
    return String(value);
  }

  return (date.getMonth() + 1) + '/' + date.getDate() + '/' + date.getFullYear();
}

function getReturnUrl() {
  if (DATA && DATA.webAppUrl) {
    return DATA.webAppUrl;
  }

  return window.location.href.replace(/\?.*$/, '');
}

function getAccountChooserUrl() {
  var target = getReturnUrl();
  return 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(target);
}

function switchGoogleAccount() {
  window.top.location.href = getAccountChooserUrl();
}

function reloadApp() {
  window.location.reload();
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/ /g, '');
}

try {
  load();
} catch (err) {
  showError(err);
}
