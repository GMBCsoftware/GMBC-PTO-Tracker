<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f3ea;
      color: #333F48;
      margin: 0;
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #e8ddc8;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }

    h1, h2, h3 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 10px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 80px;
    }

    button {
      background: #333F48;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      margin-top: 8px;
      margin-right: 6px;
    }

    button.secondary {
      background: #85431E;
    }

    button.danger {
      background: #9b1c1c;
    }

    button.light {
      background: #e8ddc8;
      color: #333F48;
    }

    button.tab {
      background: #e8ddc8;
      color: #333F48;
      margin-bottom: 10px;
    }

    button.tab.active {
      background: #333F48;
      color: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: top;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .warning {
      color: #9b1c1c;
      font-weight: bold;
    }

    .pill {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 20px;
      background: #eee;
      font-size: 12px;
    }

    .hidden {
      display: none;
    }

    .edit-card {
      border: 2px solid #333F48;
    }

    .actions {
      min-width: 210px;
    }

    .account-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .account-tools p {
      margin: 0;
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>Paid Time Off</h1>
  <div id="app" class="card">Loading...</div>
</div>

<script>
var APP_BOOT_ELEMENT = document.getElementById('app');
if (APP_BOOT_ELEMENT) {
  APP_BOOT_ELEMENT.innerHTML = '<p>Booting PTO app...</p>';
}

var DATA = null;
var ADMIN_FILTER = 'pending';
var BOOTSTRAP_TIMEOUT = null;
var BOOTSTRAP_TIMEOUT_MS = 15000;

function startBootstrapTimeout() {
  clearBootstrapTimeout();
  BOOTSTRAP_TIMEOUT = window.setTimeout(function() {
    showError('The PTO app did not receive a response from Google Apps Script. If you just changed the project, confirm the latest code was saved and redeployed, then reload this page.');
  }, BOOTSTRAP_TIMEOUT_MS);
}

function clearBootstrapTimeout() {
  if (BOOTSTRAP_TIMEOUT) {
    window.clearTimeout(BOOTSTRAP_TIMEOUT);
    BOOTSTRAP_TIMEOUT = null;
  }
}

function load() {
  var app = document.getElementById('app');
  app.innerHTML = '<p>Loading PTO data...</p>';

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    showError('Google Apps Script client services are unavailable on this page. Open the deployed web app URL directly from Apps Script and try again.');
    return;
  }

  startBootstrapTimeout();

  google.script.run
    .withSuccessHandler(function(data) {
      clearBootstrapTimeout();
      try {
        render(data);
      } catch (err) {
        showError(err);
      }
    })
    .withFailureHandler(function(err) {
      clearBootstrapTimeout();
      showError(err);
    })
    .getBootstrapData();
}

function showError(err) {
  var msg = err && err.message ? err.message : String(err);
  clearBootstrapTimeout();
  document.getElementById('app').innerHTML =
    '<h2>Something went wrong</h2>' +
    '<p class="warning">' + escapeHtml(msg) + '</p>' +
    '<div class="account-tools">' +
      '<p class="muted">If the wrong Google account opened the app, try the Google account chooser and then reload.</p>' +
      '<div>' +
        '<button class="light" onclick="switchGoogleAccount()">Choose Google Account</button>' +
        '<button onclick="reloadApp()">Reload</button>' +
      '</div>' +
    '</div>' +
    '<p class="muted">Check that the Employees, Requests, Settings, and Audit tabs exist and that their headers match exactly.</p>';
}

function render(data) {
  var app = document.getElementById('app');
  var emailLine = '';
  DATA = data;

  if (!data.ok) {
    if (data.user && data.user.email) {
      emailLine = '<p class="muted">Google account detected: ' + escapeHtml(data.user.email) + '</p>';
    } else {
      emailLine = '<p class="muted">No Google Workspace email was detected for this session.</p>';
    }

    app.innerHTML =
      '<h2>Sign-in issue</h2>' +
      '<p class="warning">' + escapeHtml(data.message) + '</p>' +
      emailLine +
      '<div class="account-tools">' +
        '<p class="muted">If this is the wrong account, open the Google account chooser and then reload the PTO app.</p>' +
        '<div>' +
          '<button class="light" onclick="switchGoogleAccount()">Choose Google Account</button>' +
          '<button onclick="reloadApp()">Reload</button>' +
        '</div>' +
      '</div>';
    return;
  }

  app.innerHTML =
    '<div class="card">' +
      '<h2>Hello, ' + escapeHtml(data.employee.Name) + '</h2>' +
      '<div class="account-tools">' +
        '<p class="muted">Signed in as ' + escapeHtml(data.employee.Email) + '</p>' +
        '<button class="light" onclick="switchGoogleAccount()">Choose Google Account</button>' +
      '</div>' +
    '</div>' +
    renderBalances(data.balances) +
    renderRequestForm() +
    renderRequests('My Requests', data.myRequests, false, false) +
    (data.isSupervisor ? renderRequests('Supervisor Approval Dashboard', data.supervisorRequests, false, true) : '') +
    (data.isAdmin ? renderAdminDashboard(data.allRequests) : '');

  initializeHoursRecommendationWidgets();
}

function renderBalances(b) {
  return (
    '<div class="card">' +
      '<h2>My Time Off Balance</h2>' +
      '<div class="grid">' +
        '<div class="card">' +
          '<h3>Annual Leave</h3>' +
          '<p><strong>Allowance:</strong> ' + escapeHtml(b.annual.allowanceHours) + ' hrs</p>' +
          '<p><strong>Used:</strong> ' + escapeHtml(b.annual.usedHours) + ' hrs</p>' +
          '<p><strong>Requested:</strong> ' + escapeHtml(b.annual.requestedHours) + ' hrs</p>' +
          '<p><strong>Available Now:</strong> ' + escapeHtml(b.annual.availableHours) + ' hrs</p>' +
        '</div>' +
        '<div class="card">' +
          '<h3>Personal Leave</h3>' +
          '<p><strong>Allowance:</strong> ' + escapeHtml(b.personal.allowanceHours) + ' hrs</p>' +
          '<p><strong>Used:</strong> ' + escapeHtml(b.personal.usedHours) + ' hrs</p>' +
          '<p><strong>Requested:</strong> ' + escapeHtml(b.personal.requestedHours) + ' hrs</p>' +
          '<p><strong>Available Now:</strong> ' + escapeHtml(b.personal.availableHours) + ' hrs</p>' +
        '</div>' +
        '<div class="card">' +
          '<h3>Serious Illness</h3>' +
          '<p><strong>Allowance:</strong> ' + escapeHtml(b.serious.allowanceHours) + ' hrs</p>' +
          '<p><strong>Used:</strong> ' + escapeHtml(b.serious.usedHours) + ' hrs</p>' +
          '<p><strong>Requested:</strong> ' + escapeHtml(b.serious.requestedHours) + ' hrs</p>' +
          '<p><strong>Available Now:</strong> ' + escapeHtml(b.serious.availableHours) + ' hrs</p>' +
        '</div>' +
      '</div>' +
    '</div>'
  );
}

function renderRequestForm() {
  return (
    '<div class="card">' +
      '<h2>Request Time Off</h2>' +
      '<label>Leave Type</label>' +
      '<select id="leaveType">' +
        '<option>Annual Leave</option>' +
        '<option>Personal Leave</option>' +
        '<option>Serious Illness Leave</option>' +
        '<option>Bereavement Leave</option>' +
        '<option>Unpaid Leave</option>' +
        '<option>Other</option>' +
      '</select>' +
      '<div class="grid">' +
        '<div>' +
          '<label>Start Date</label>' +
          '<input id="startDate" type="date" onchange="refreshHoursRecommendation()">' +
        '</div>' +
        '<div>' +
          '<label>End Date</label>' +
          '<input id="endDate" type="date" onchange="refreshHoursRecommendation()">' +
        '</div>' +
        '<div>' +
          '<label>Hours Requested</label>' +
          '<input id="hoursRequested" type="number" step="0.25" min="0">' +
        '</div>' +
      '</div>' +
      '<p id="hoursRecommendation" class="muted"></p>' +
      '<button type="button" class="light" onclick="applyHoursRecommendation()">Use Recommended Hours</button>' +
      '<label>Reason / Notes</label>' +
      '<textarea id="reason"></textarea>' +
      '<button onclick="submitRequest()">Submit Request</button>' +
      '<p id="submitResult" class="muted"></p>' +
    '</div>'
  );
}

function renderAdminDashboard(requests) {
  var pendingClass = ADMIN_FILTER === 'pending' ? ' active' : '';
  var approvedClass = ADMIN_FILTER === 'approved' ? ' active' : '';
  var deniedClass = ADMIN_FILTER === 'denied' ? ' active' : '';
  var allClass = ADMIN_FILTER === 'all' ? ' active' : '';

  return (
    '<div class="card">' +
      '<h2>Admin Dashboard</h2>' +
      '<button class="tab' + pendingClass + '" onclick="setAdminFilter(\'pending\')">Pending / Unapproved</button>' +
      '<button class="tab' + approvedClass + '" onclick="setAdminFilter(\'approved\')">Approved</button>' +
      '<button class="tab' + deniedClass + '" onclick="setAdminFilter(\'denied\')">Denied</button>' +
      '<button class="tab' + allClass + '" onclick="setAdminFilter(\'all\')">All</button>' +
      renderRequestsTable(filterAdminRequests(requests || []), true, false) +
    '</div>'
  );
}

function setAdminFilter(filter) {
  ADMIN_FILTER = filter;
  render(DATA);
}

function filterAdminRequests(requests) {
  var i;
  var filtered = [];

  for (i = 0; i < requests.length; i++) {
    if (
      ADMIN_FILTER === 'approved' &&
      (requests[i].Status === 'Approved' || requests[i].Status === 'Edit Approved')
    ) {
      filtered.push(requests[i]);
    } else if (
      ADMIN_FILTER === 'denied' &&
      (
        requests[i].Status === 'Denied by Supervisor' ||
        requests[i].Status === 'Denied by Admin' ||
        requests[i].Status === 'Edit Denied by Supervisor' ||
        requests[i].Status === 'Edit Denied by Admin'
      )
    ) {
      filtered.push(requests[i]);
    } else if (ADMIN_FILTER === 'all') {
      filtered.push(requests[i]);
    } else if (
      ADMIN_FILTER === 'pending' &&
      (requests[i].Status === 'Pending Supervisor Approval' ||
        requests[i].Status === 'Pending Admin Final Approval' ||
        requests[i].Status === 'Pending Supervisor Reapproval' ||
        requests[i].Status === 'Pending Admin Reapproval')
    ) {
      filtered.push(requests[i]);
    }
  }

  return filtered;
}

function renderRequests(title, requests, adminMode, supervisorMode) {
  return (
    '<div class="card">' +
      '<h2>' + escapeHtml(title) + '</h2>' +
      renderRequestsTable(requests, adminMode, supervisorMode) +
    '</div>'
  );
}

function renderRequestsTable(requests, adminMode, supervisorMode) {
  var i;
  var html = '';
  var warningsHtml;

  if (!requests || !requests.length) {
    return '<p class="muted">No requests found.</p>';
  }

  for (i = 0; i < requests.length; i++) {
    warningsHtml = requests[i].Warnings
      ? '<span class="warning">' + escapeHtml(requests[i].Warnings) + '</span>'
      : '';

    html +=
      '<tr>' +
        '<td><strong>' + escapeHtml(requests[i].EmployeeName || '') + '</strong><br><span class="muted">' + escapeHtml(requests[i].EmployeeEmail || '') + '</span></td>' +
        '<td>' + escapeHtml(requests[i].LeaveType || '') + '</td>' +
        '<td>' + escapeHtml(formatDate(requests[i].StartDate)) + ' to ' + escapeHtml(formatDate(requests[i].EndDate)) + '</td>' +
        '<td>' + escapeHtml(requests[i].HoursRequested || '') + '</td>' +
        '<td><span class="pill">' + escapeHtml(requests[i].Status || '') + '</span></td>' +
        '<td>' + warningsHtml + '</td>' +
        '<td class="actions">' + renderActions(requests[i], adminMode, supervisorMode) + '</td>' +
      '</tr>' +
      '<tr id="edit-row-' + escapeAttr(requests[i].RequestId) + '" class="hidden">' +
        '<td colspan="7">' + renderEditCard(requests[i]) + '</td>' +
      '</tr>';
  }

  return (
    '<table>' +
      '<thead>' +
        '<tr>' +
          '<th>Employee</th>' +
          '<th>Type</th>' +
          '<th>Dates</th>' +
          '<th>Hours</th>' +
          '<th>Status</th>' +
          '<th>Warnings</th>' +
          '<th>Action</th>' +
        '</tr>' +
      '</thead>' +
      '<tbody>' + html + '</tbody>' +
    '</table>'
  );
}

function renderActions(request, adminMode, supervisorMode) {
  if (adminMode) {
    return renderAdminButtons(request);
  }

  if (supervisorMode) {
    return renderSupervisorButtons(request);
  }

  return renderEmployeeButtons(request);
}

function renderEmployeeButtons(request) {
  var actions = '';

  if (canEmployeeEditRequest(request)) {
    actions += '<button class="secondary" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Edit</button>';
  }

  actions += '<div class="muted">' + escapeHtml(getStatusHintText(request)) + '</div>';
  return actions;
}

function renderStatusHint(request) {
  return '<span class="muted">' + escapeHtml(getStatusHintText(request)) + '</span>';
}

function getStatusHintText(request) {
  if (request.Status === 'Pending Supervisor Approval') {
    return 'Waiting on supervisor';
  }

  if (request.Status === 'Pending Admin Final Approval') {
    return 'Waiting on final admin approval';
  }

  if (request.Status === 'Pending Supervisor Reapproval') {
    return 'Change waiting on supervisor reapproval';
  }

  if (request.Status === 'Pending Admin Reapproval') {
    return 'Change waiting on final admin approval';
  }

  if (request.Status === 'Approved') {
    return 'Approved';
  }

  if (request.Status === 'Edit Approved') {
    return 'Approved change';
  }

  if (request.Status === 'Edit Denied by Supervisor' || request.Status === 'Edit Denied by Admin') {
    return 'Change denied';
  }

  return request.Status || '';
}

function canEmployeeEditRequest(request) {
  return (
    request.Status === 'Pending Supervisor Approval' ||
    request.Status === 'Pending Admin Final Approval' ||
    request.Status === 'Approved' ||
    request.Status === 'Pending Supervisor Reapproval' ||
    request.Status === 'Pending Admin Reapproval'
  );
}

function renderSupervisorButtons(request) {
  if (
    request.Status !== 'Pending Supervisor Approval' &&
    request.Status !== 'Pending Supervisor Reapproval'
  ) {
    return '';
  }

  return (
    '<button class="secondary" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Edit</button>' +
    '<label style="font-weight:normal; display:block; margin-top:8px;">' +
      '<input type="checkbox" id="sup-override-' + escapeAttr(request.RequestId) + '" style="width:auto;">' +
      ' Override balance if needed' +
    '</label>' +
    '<button onclick="supervisorDecision(\'' + escapeAttr(request.RequestId) + '\',\'approve\')">Approve</button>' +
    '<button class="danger" onclick="supervisorDecision(\'' + escapeAttr(request.RequestId) + '\',\'deny\')">Deny</button>'
  );
}

function renderAdminButtons(request) {
  if (
    request.Status !== 'Pending Admin Final Approval' &&
    request.Status !== 'Pending Supervisor Approval' &&
    request.Status !== 'Pending Admin Reapproval' &&
    request.Status !== 'Pending Supervisor Reapproval'
  ) {
    return '';
  }

  return (
    '<button class="secondary" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Edit</button>' +
    '<label style="font-weight:normal; display:block; margin-top:8px;">' +
      '<input type="checkbox" id="override-' + escapeAttr(request.RequestId) + '" style="width:auto;">' +
      ' Override balance if needed' +
    '</label>' +
    '<button onclick="adminDecision(\'' + escapeAttr(request.RequestId) + '\',\'approve\')">Final Approve</button>' +
    '<button class="danger" onclick="adminDecision(\'' + escapeAttr(request.RequestId) + '\',\'deny\')">Deny</button>'
  );
}

function renderEditCard(request) {
  var isApproved = request.Status === 'Approved';
  var saveLabel = isApproved ? 'Submit Change For Reapproval' : 'Save Changes';
  var helperText = isApproved
    ? 'Changes to an approved request will create a reapproval request. The current calendar schedule will stay in place until the updated request is approved.'
    : 'Changes made here update the request without sending a new email while it is still waiting for approval.';

  return (
    '<div class="card edit-card">' +
      '<h3>Edit Request</h3>' +
      '<p class="muted">' + escapeHtml(helperText) + '</p>' +
      '<div class="grid">' +
        '<div>' +
          '<label>Start Date</label>' +
          '<input id="edit-start-' + escapeAttr(request.RequestId) + '" type="date" value="' + escapeAttr(formatDate(request.StartDate)) + '" onchange="refreshEditHoursRecommendation(\'' + escapeAttr(request.RequestId) + '\')">' +
        '</div>' +
        '<div>' +
          '<label>End Date</label>' +
          '<input id="edit-end-' + escapeAttr(request.RequestId) + '" type="date" value="' + escapeAttr(formatDate(request.EndDate)) + '" onchange="refreshEditHoursRecommendation(\'' + escapeAttr(request.RequestId) + '\')">' +
        '</div>' +
        '<div>' +
          '<label>Hours Requested</label>' +
          '<input id="edit-hours-' + escapeAttr(request.RequestId) + '" type="number" step="0.25" min="0" value="' + escapeAttr(request.HoursRequested || '') + '">' +
        '</div>' +
      '</div>' +
      '<p id="edit-recommend-' + escapeAttr(request.RequestId) + '" class="muted"></p>' +
      '<button type="button" class="light" onclick="applyEditHoursRecommendation(\'' + escapeAttr(request.RequestId) + '\')">Use Recommended Hours</button>' +
      '<label>Reason / Notes</label>' +
      '<textarea id="edit-reason-' + escapeAttr(request.RequestId) + '">' + escapeHtml(request.Reason || '') + '</textarea>' +
      '<button onclick="saveRequestEdit(\'' + escapeAttr(request.RequestId) + '\')">' + saveLabel + '</button>' +
      '<button class="light" onclick="toggleEditCard(\'' + escapeAttr(request.RequestId) + '\')">Cancel</button>' +
      '<p id="edit-result-' + escapeAttr(request.RequestId) + '" class="muted"></p>' +
    '</div>'
  );
}

function toggleEditCard(requestId) {
  var row = document.getElementById('edit-row-' + requestId);
  if (row) {
    if (row.className.indexOf('hidden') >= 0) {
      row.className = row.className.replace('hidden', '').trim();
      refreshEditHoursRecommendation(requestId);
    } else {
      row.className += ' hidden';
    }
  }
}

function saveRequestEdit(requestId) {
  var startDate = document.getElementById('edit-start-' + requestId).value;
  var endDate = document.getElementById('edit-end-' + requestId).value;
  var hoursRequested = document.getElementById('edit-hours-' + requestId).value;
  var reason = document.getElementById('edit-reason-' + requestId).value;
  var result = document.getElementById('edit-result-' + requestId);

  result.innerText = 'Saving...';

  google.script.run
    .withSuccessHandler(function(res) {
      result.innerText = res.message;
      load();
    })
    .withFailureHandler(function(err) {
      result.innerText = err.message || String(err);
    })
    .updateRequestDetails(requestId, {
      startDate: startDate,
      endDate: endDate,
      hoursRequested: hoursRequested,
      reason: reason
    });
}

function initializeHoursRecommendationWidgets() {
  var editRows;
  var i;

  refreshHoursRecommendation();
  editRows = document.querySelectorAll('[id^="edit-row-"]');

  for (i = 0; i < editRows.length; i++) {
    refreshEditHoursRecommendation(editRows[i].id.replace('edit-row-', ''));
  }
}

function refreshHoursRecommendation() {
  refreshRecommendationForFields('startDate', 'endDate', 'hoursRequested', 'hoursRecommendation');
}

function refreshEditHoursRecommendation(requestId) {
  refreshRecommendationForFields(
    'edit-start-' + requestId,
    'edit-end-' + requestId,
    'edit-hours-' + requestId,
    'edit-recommend-' + requestId
  );
}

function applyHoursRecommendation() {
  applyRecommendationForField('startDate', 'endDate', 'hoursRequested');
  refreshHoursRecommendation();
}

function applyEditHoursRecommendation(requestId) {
  applyRecommendationForField(
    'edit-start-' + requestId,
    'edit-end-' + requestId,
    'edit-hours-' + requestId
  );
  refreshEditHoursRecommendation(requestId);
}

function refreshRecommendationForFields(startId, endId, hoursId, messageId) {
  var startValue = document.getElementById(startId);
  var endValue = document.getElementById(endId);
  var hoursField = document.getElementById(hoursId);
  var message = document.getElementById(messageId);
  var suggestion;

  if (!startValue || !endValue || !hoursField || !message) {
    return;
  }

  suggestion = getHourSuggestion(startValue.value, endValue.value);

  if (!suggestion) {
    message.innerText = '';
    return;
  }

  message.innerText =
    'Recommended hours: ' + suggestion.hours +
    ' (' + suggestion.days +
    ' day' + (suggestion.days === 1 ? '' : 's') +
    ' at 8 hours, excluding Fridays and Saturdays).';

  if (shouldAutoApplySuggestion(hoursField, suggestion.hours)) {
    hoursField.value = suggestion.hours;
  }

  hoursField.setAttribute('data-last-suggested', String(suggestion.hours));
}

function applyRecommendationForField(startId, endId, hoursId) {
  var hoursField = document.getElementById(hoursId);
  var startValue = document.getElementById(startId);
  var endValue = document.getElementById(endId);
  var suggestion;

  if (!hoursField || !startValue || !endValue) {
    return;
  }

  suggestion = getHourSuggestion(startValue.value, endValue.value);

  if (!suggestion) {
    return;
  }

  hoursField.value = suggestion.hours;
  hoursField.setAttribute('data-last-suggested', String(suggestion.hours));
}

function shouldAutoApplySuggestion(hoursField, suggestedHours) {
  var currentValue = String(hoursField.value || '').trim();
  var previousSuggested = String(hoursField.getAttribute('data-last-suggested') || '').trim();

  return !currentValue || currentValue === '0' || currentValue === previousSuggested;
}

function getHourSuggestion(startDate, endDate) {
  var start = parseDateInput(startDate);
  var end = parseDateInput(endDate);
  var cursor;
  var days = 0;

  if (!start || !end || end < start) {
    return null;
  }

  cursor = new Date(start.getFullYear(), start.getMonth(), start.getDate());

  while (cursor <= end) {
    if (cursor.getDay() !== 5 && cursor.getDay() !== 6) {
      days += 1;
    }

    cursor.setDate(cursor.getDate() + 1);
  }

  return {
    days: days,
    hours: days * 8
  };
}

function parseDateInput(value) {
  var parts;

  if (!value) {
    return null;
  }

  parts = String(value).split('-');

  if (parts.length !== 3) {
    return null;
  }

  return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
}

function submitRequest() {
  var payload = {
    leaveType: document.getElementById('leaveType').value,
    startDate: document.getElementById('startDate').value,
    endDate: document.getElementById('endDate').value,
    hoursRequested: document.getElementById('hoursRequested').value,
    reason: document.getElementById('reason').value
  };

  document.getElementById('submitResult').innerText = 'Submitting...';

  google.script.run
    .withSuccessHandler(function(res) {
      document.getElementById('submitResult').innerText = res.message;
      load();
    })
    .withFailureHandler(function(err) {
      document.getElementById('submitResult').innerText = err.message || String(err);
    })
    .submitRequest(payload);
}

function supervisorDecision(requestId, decision) {
  var overrideBox = document.getElementById('sup-override-' + requestId);
  var overrideBalance = overrideBox ? overrideBox.checked : false;
  var note = prompt('Optional note for this decision:', '') || '';

  google.script.run
    .withSuccessHandler(function(res) {
      alert(res.message);
      load();
    })
    .withFailureHandler(showError)
    .supervisorDecision(requestId, decision, note, overrideBalance);
}

function adminDecision(requestId, decision) {
  var overrideBox = document.getElementById('override-' + requestId);
  var overrideBalance = overrideBox ? overrideBox.checked : false;
  var note = prompt('Optional note for this decision:', '') || '';

  google.script.run
    .withSuccessHandler(function(res) {
      alert(res.message);
      load();
    })
    .withFailureHandler(showError)
    .adminDecision(requestId, decision, note, overrideBalance);
}

function formatDate(value) {
  if (!value) {
    return '';
  }

  if (typeof value === 'string') {
    return value.substring(0, 10);
  }

  return String(value).substring(0, 10);
}

function getReturnUrl() {
  if (DATA && DATA.webAppUrl) {
    return DATA.webAppUrl;
  }

  return window.location.href.replace(/\?.*$/, '');
}

function getAccountChooserUrl() {
  var target = getReturnUrl();
  return 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent(target);
}

function switchGoogleAccount() {
  window.top.location.href = getAccountChooserUrl();
}

function reloadApp() {
  window.location.reload();
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/ /g, '');
}

try {
  load();
} catch (err) {
  showError(err);
}
</script>
